<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Talkio - WebRTC</title>
  <link href="index.css" rel="stylesheet" />
</head>

<body>
  <main class="wrapper">
    <div class="streams">
      <video hidden autoplay playsinline class="stream__local"></video>
      <video hidden autoplay playsinline class="stream__remote"></video>
    </div>
    <div class="error-message" hidden>
      <h2>Server is full</h2>
      <p>Maximum 2 users can connect at a time. Please try again later.</p>
    </div>
  </main>

  <script src="index.js"></script>
</body>

</html>
